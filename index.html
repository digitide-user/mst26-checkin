<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>MST26 受付（checkin）- roster test</title>
  <style>
    :root {
      --bg: #111;
      --fg: #f5f5f5;
      --muted: #bbb;
      --ok: #3ddc84;
      --ng: #ff6b6b;
      --card: #1b1b1b;
      --btn: #2a2a2a;
      --btn2: #0a84ff;
      --warn: #ffd166;
      --line: #2a2a2a;
      --input: #161616;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--fg);
    }
    .wrap {
      max-width: 520px;
      margin: 0 auto;
      padding: 16px;
    }
    .title {
      font-size: 28px;
      font-weight: 800;
      text-align: center;
      margin: 8px 0 12px;
      letter-spacing: .03em;
    }
    .card {
      background: var(--card);
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .status {
      min-height: 1.4em;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .status.ok { color: var(--ok); }
    .status.ng { color: var(--ng); }
    .status.warn { color: var(--warn); }
    .status.muted { color: var(--muted); font-weight: 600; }

    .substatus {
      min-height: 1.2em;
      font-size: 13px;
      font-weight: 700;
      margin-top: 8px;
    }
    .substatus.ok { color: var(--ok); }
    .substatus.ng { color: var(--ng); }
    .substatus.warn { color: var(--warn); }
    .substatus.muted { color: var(--muted); }

    .camera-box {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 14px;
      overflow: hidden;
      background: #000;
      position: relative;
      border: 1px solid #333;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: #000;
    }
    .overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
    }
    .qr-frame {
      width: 82%;
      height: 82%;
      border: 3px solid rgba(255,255,255,.85);
      border-radius: 16px;
      box-shadow: 0 0 0 9999px rgba(0,0,0,.18) inset;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .row3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }
    button {
      appearance: none;
      border: 0;
      border-radius: 12px;
      padding: 14px 12px;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      background: var(--btn);
    }
    button.primary { background: var(--btn2); }
    button:disabled { opacity: .45; }

    .label {
      color: var(--muted);
      font-size: 12px;
      margin-top: 10px;
      margin-bottom: 4px;
    }
    .input {
      width: 100%;
      border: 1px solid var(--line);
      background: var(--input);
      color: var(--fg);
      border-radius: 10px;
      padding: 12px;
      font-size: 16px;
    }
    .result {
      min-height: 2.2em;
      border-radius: 10px;
      background: #151515;
      border: 1px solid #2a2a2a;
      padding: 10px;
      font-weight: 700;
      line-height: 1.4;
      word-break: break-word;
    }

    .small {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      margin-top: 8px;
    }
    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--muted);
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">受付</div>

    <div class="card">
      <div class="label">operator（担当者名）</div>
      <input id="operator" class="input" type="text" inputmode="text" autocomplete="off" placeholder="例: けんすけ" />

      <div class="row3" style="margin-top:10px;">
        <button id="btnLoadSettings">読込</button>
        <button id="btnSaveSettings" class="primary">保存</button>
        <button id="btnClearSettings">消去</button>
      </div>

      <div id="settingsStatus" class="substatus muted">設定はまだ保存していません</div>
      <div class="small">
        ※ API Base URL はコード内固定（CP1と同じアクセス方式）です。<br>
        ※ operator を localStorage に保存します（端末内のみ）。
      </div>
    </div>

    <div class="card">
      <div class="row">
        <button id="btnFetchRoster" class="primary">名簿更新</button>
        <button id="btnShowRosterInfo">名簿情報</button>
      </div>
      <div id="rosterStatus" class="substatus muted">名簿未取得</div>
      <div class="small">
        ※ CP1と同じ方式で、固定API_BASEの <code>/roster</code> を取得します。
      </div>
    </div>

    <div class="card">
      <div id="status" class="status muted">待機中（まだ開始していません）</div>

      <div class="camera-box">
        <video id="video" playsinline muted autoplay></video>
        <div class="overlay"><div class="qr-frame"></div></div>
      </div>

      <div class="row" style="margin-top:10px;">
        <button id="btnStart" class="primary">スキャン開始（カメラ起動）</button>
        <button id="btnStop">停止</button>
      </div>

      <div class="label">読取結果</div>
      <div id="result" class="result">まだ読取なし</div>

      <!-- 読取結果の直下に ステータス表示 + RUN/DNS/取消 を配置 -->
      <div id="checkinActionResult" style="margin-top:8px;">まだ未確定</div>
      <div style="display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; margin-bottom:8px;">
        <button id="runBtn" type="button" disabled>RUN</button>
        <button id="dnsBtn" type="button" disabled>DNS</button>
        <button id="cancelBtn" type="button" disabled>取消</button>
      </div>

      <!-- RUN変更インライン確認UI（オーバーレイは使わない） -->
      <div id="runChangeConfirmInline" style="display:none; margin:8px 0; padding:10px; border:1px solid #d1d5db; border-radius:8px; background:#fff;">
        <div id="runChangeConfirmMsgInline" style="font-weight:700; margin-bottom:6px;">確認</div>
        <div id="runChangeConfirmNoteInline" class="substatus muted" style="margin-bottom:8px;"></div>
        <div style="display:flex; gap:8px;">
          <button id="btnRunChangeCancelInline">キャンセル</button>
          <button id="btnRunChangeOkInline" class="primary">変更する</button>
        </div>
      </div>

      
      <!-- debug JSON は残すがUIでは非表示（必要時のみ再表示） -->
      <div id="debug" class="mono" style="display:none;"></div>
    </div>
  </div>

  <!-- QR decode library -->
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>

  <script>
    // ---- 固定API_BASE（CP1と同じアクセス方式）----
    // 本番UIでは入力させない
    const FIXED_API_BASE = 'https://mst26-cp1-proxy.work-d3c.workers.dev';

    // ---- storage keys (checkin専用) ----
    const LS_KEYS = {
      apiKey: 'mst26.checkin.apiKey',
      operator: 'mst26.checkin.operator',
      roster: 'mst26.checkin.roster',
      rosterGeneratedAt: 'mst26.checkin.roster.generatedAt'
    };

    const statusEl = document.getElementById('status');
    const debugEl = document.getElementById('debug');
    const resultEl = document.getElementById('result');
    const videoEl = document.getElementById('video');
    const btnStart = document.getElementById('btnStart');
    const btnStop = document.getElementById('btnStop');

    const apiKeyEl = document.getElementById('apiKey');
    const operatorEl = document.getElementById('operator');
    const btnLoadSettings = document.getElementById('btnLoadSettings');
    const btnSaveSettings = document.getElementById('btnSaveSettings');
    const btnClearSettings = document.getElementById('btnClearSettings');
    const settingsStatusEl = document.getElementById('settingsStatus');

    const btnFetchRoster = document.getElementById('btnFetchRoster');
    const btnShowRosterInfo = document.getElementById('btnShowRosterInfo');
    const rosterStatusEl = document.getElementById('rosterStatus');

    let stream = null;
    let rafId = null;
    let scanActive = false;
    let lastScanText = '';
    let lastScanAt = 0;
    let decodeCanvas = document.createElement('canvas');
    let decodeCtx = decodeCanvas.getContext('2d', { willReadFrequently: true });

    function setStatus(text, kind = 'muted') {
      statusEl.textContent = text;
      statusEl.className = 'status ' + kind;
    }

    function setSettingsStatus(text, kind = 'muted') {
      settingsStatusEl.textContent = text;
      settingsStatusEl.className = 'substatus ' + kind;
    }

    function setRosterStatus(text, kind = 'muted') {
      rosterStatusEl.textContent = text;
      rosterStatusEl.className = 'substatus ' + kind;
    }

    function setDebug(obj) {
      try {
        debugEl.textContent = typeof obj === 'string' ? obj : JSON.stringify(obj, null, 2);
      } catch {
        debugEl.textContent = String(obj);
      }
    }

    function setResult(text) {
      resultEl.textContent = text;
    }

    // ---- Beep helpers (iPhone Safari 配慮) ----
    let __beepCtx = null;
    let __beepGain = null;
    function ensureBeepReady_() {
      try {
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (!Ctx) return;
        if (!__beepCtx) {
          __beepCtx = new Ctx();
        }
        if (__beepCtx.state === 'suspended') {
          __beepCtx.resume().catch(() => {});
        }
        if (!__beepGain) {
          __beepGain = __beepCtx.createGain();
          __beepGain.gain.value = 0.09; // 少し控えめ
          __beepGain.connect(__beepCtx.destination);
        }
      } catch (_) {}
    }

    function playScanBeep_() {
      try {
        if (!__beepCtx) ensureBeepReady_();
        if (!__beepCtx || !__beepGain) return;
        const osc = __beepCtx.createOscillator();
        osc.type = 'sine';
        osc.frequency.value = 1200; // 少し高め（聞こえやすく）
        osc.connect(__beepGain);
        const now = __beepCtx.currentTime;
        osc.start(now);
        osc.stop(now + 0.17); // 170ms ビープ
      } catch (_) {}
    }

    function getCurrentSettings_() {
      const operator = (operatorEl && typeof operatorEl.value === 'string' && operatorEl.value.trim())
        || (localStorage.getItem(LS_KEYS.operator) || '').trim();
      return { operator };
    }

    function findRosterStartStatusByBib_(bib) {
      try {
        const roster = getLocalRoster();
        const hit = roster.find((it) => {
          const v = Number(it?.bibNumber ?? it?.bib);
          return Number.isFinite(v) && v === Number(bib);
        }) || null;
        const st = hit && (hit.start_status ?? hit.startStatus);
        return typeof st === 'string' ? st : '';
      } catch { return ''; }
    }

    function shouldConfirmRunChange_(currentStatus) {
      return currentStatus === 'DNS_DESK' || currentStatus === 'DNS_NO_SHOW';
    }

    async function openRunChangeInlineConfirm_(currentStatus) {
      const wrap = document.getElementById('runChangeConfirmInline');
      const msg = document.getElementById('runChangeConfirmMsgInline');
      const note = document.getElementById('runChangeConfirmNoteInline');
      const ok = document.getElementById('btnRunChangeOkInline');
      const cancel = document.getElementById('btnRunChangeCancelInline');
      if (!wrap || !msg || !ok || !cancel) return true; // フォールバックで続行

      msg.textContent = `この選手は現在 ${currentStatus} です。出走（RUN）に変更しますか？`;
      note.textContent = '';
      wrap.style.display = 'block';

      // 確認時のみ status を取得（失敗しても続行）
      try {
        const url = `${FIXED_API_BASE}/status`;
        const res = await fetchJson(url, { method: 'GET' }, 8000);
        if (res && res.ok && res.json) {
          const j = res.json;
          const isClosed = !!(j.closed || j.is_closed || j.closed_at || j.closedAt);
          if (isClosed) {
            const when = j.closed_jst || j.closed_at_jst || j.closed_at || j.closedAt || '';
            note.textContent = when ? `受付は締切済み（${String(when)} JST）` : '受付は締切済み';
          }
        }
      } catch (_) {}

      return await new Promise((resolve) => {
        function cleanup() {
          try { ok.removeEventListener('click', onOk); } catch(_) {}
          try { cancel.removeEventListener('click', onCancel); } catch(_) {}
          wrap.style.display = 'none';
        }
        function onOk() { cleanup(); resolve(true); }
        function onCancel() { cleanup(); resolve(false); }
        ok.addEventListener('click', onOk, { once: true });
        cancel.addEventListener('click', onCancel, { once: true });
      });
    }

    function closeRunChangeInlineConfirm_() {
      const wrap = document.getElementById('runChangeConfirmInline');
      if (wrap) wrap.style.display = 'none';
    }

    function updateLocalRosterStartStatus_(bib, newStatus) {
      try {
        const roster = getLocalRoster();
        if (!Array.isArray(roster) || roster.length === 0) return;
        let changed = false;
        for (const it of roster) {
          const v = Number(it?.bibNumber ?? it?.bib);
          if (Number.isFinite(v) && v === Number(bib)) {
            it.start_status = newStatus;
            if ('startStatus' in it) it.startStatus = newStatus;
            changed = true;
            break;
          }
        }
        if (changed) {
          const generatedAt = localStorage.getItem(LS_KEYS.rosterGeneratedAt) || '';
          saveLocalRoster(roster, generatedAt);
        }
      } catch (_) {}
    }

    function isOperatorSaved_() {
      const v = (localStorage.getItem(LS_KEYS.operator) || '').trim();
      return v.length > 0;
    }

    function isRosterLoaded_() {
      try {
        const roster = getLocalRoster();
        return Array.isArray(roster) && roster.length > 0;
      } catch (_) {
        return false;
      }
    }

    function updateCheckinControlsState_() {
      const pendingOk = !!(window.__checkinPending);
      const operatorOk = isOperatorSaved_();
      const rosterOk = isRosterLoaded_();
      const elRunBtn = document.getElementById('runBtn');
      const elDnsBtn = document.getElementById('dnsBtn');
      const elCancelBtn = document.getElementById('cancelBtn');
      const enableRunDns = pendingOk && operatorOk && rosterOk;
      if (elRunBtn) elRunBtn.disabled = !enableRunDns;
      if (elDnsBtn) elDnsBtn.disabled = !enableRunDns;
      if (elCancelBtn) elCancelBtn.disabled = !pendingOk;
    }

    // 用途ごと（'roster' / 'checkin'）に不足メッセージを適切な場所へ表示
    function ensureSettingsOrWarn_(context = 'roster') {
      const { operator } = getCurrentSettings_();
      if (operator) return true;

      const baseMsg = context === 'checkin'
        ? '送信不可: operator 未入力'
        : '名簿更新不可: operator 未入力';

      if (context === 'checkin') {
        const elCheckinActionResult = document.getElementById('checkinActionResult');
        if (elCheckinActionResult) elCheckinActionResult.textContent = baseMsg;
      } else {
        setRosterStatus(baseMsg, 'ng');
      }
      setSettingsStatus('operator を保存してください。', 'warn');
      return false;
    }

    function loadSettings() {
      const apiKey = localStorage.getItem(LS_KEYS.apiKey) || '';
      const operator = localStorage.getItem(LS_KEYS.operator) || '';

      if (apiKeyEl) apiKeyEl.value = apiKey;
      operatorEl.value = operator;

      if (apiKey || operator) {
        setSettingsStatus('保存済み設定を読込しました', 'ok');
      } else {
        setSettingsStatus('保存済み設定はありません', 'muted');
      }

      refreshRosterStatusFromLocal();
      updateCheckinControlsState_();
    }

    function saveSettings() {
      const apiKey = apiKeyEl ? (apiKeyEl.value || '').trim() : '';
      const operator = (operatorEl.value || '').trim();

      if (apiKeyEl) localStorage.setItem(LS_KEYS.apiKey, apiKey);
      localStorage.setItem(LS_KEYS.operator, operator);

      if (!operator) {
        setSettingsStatus('保存しました（operator が空です）', 'warn');
        return;
      }

      setSettingsStatus('設定を保存しました', 'ok');
      updateCheckinControlsState_();
    }

    function clearSettings() {
      localStorage.removeItem(LS_KEYS.apiKey);
      localStorage.removeItem(LS_KEYS.operator);
      if (apiKeyEl) apiKeyEl.value = '';
      operatorEl.value = '';
      setSettingsStatus('設定を消去しました', 'muted');
      updateCheckinControlsState_();
    }

    function getLocalRoster() {
      try {
        const raw = localStorage.getItem(LS_KEYS.roster);
        if (!raw) return [];
        const arr = JSON.parse(raw);
        return Array.isArray(arr) ? arr : [];
      } catch {
        return [];
      }
    }

    function saveLocalRoster(roster, generatedAt) {
      localStorage.setItem(LS_KEYS.roster, JSON.stringify(roster || []));
      localStorage.setItem(LS_KEYS.rosterGeneratedAt, String(generatedAt || ''));
    }

    function refreshRosterStatusFromLocal() {
      const roster = getLocalRoster();
      const generatedAt = localStorage.getItem(LS_KEYS.rosterGeneratedAt) || '';
      if (roster.length > 0) {
        setRosterStatus(`名簿あり: ${roster.length}件${generatedAt ? ' / ' + generatedAt : ''}`, 'ok');
      } else {
        setRosterStatus('名簿未取得', 'muted');
      }
    }

    async function fetchJson(url, options = {}, timeoutMs = 15000) {
      const controller = new AbortController();
      const t = setTimeout(() => controller.abort(), timeoutMs);
      try {
        const res = await fetch(url, { ...options, signal: controller.signal, cache: 'no-store' });
        const text = await res.text();
        let json = null;
        try { json = JSON.parse(text); } catch (_) {}
        return { ok: res.ok, status: res.status, text, json };
      } catch (e) {
        const msg = (e && e.name === 'AbortError') ? `Timeout(${timeoutMs}ms)` : String(e);
        return { ok: false, status: 0, text: msg, json: null };
      } finally {
        clearTimeout(t);
      }
    }

    async function fetchRoster() {
      // 事前チェック（GAS運用踏襲）
      if (!ensureSettingsOrWarn_('roster')) return;

      // CP1と同じ方式: 固定API_BASE + /roster
      // API KEY は通信に載せない（Workers側で付与/検証想定）
      const url = `${FIXED_API_BASE}/roster`;

      btnFetchRoster.disabled = true;
      setRosterStatus('名簿更新中…', 'muted');
      setDebug('');

      try {
        const res = await fetchJson(url, { method: 'GET' }, 15000);

        if (!res.ok || !res.json) {
          setRosterStatus('名簿更新失敗（通信？）', 'ng');
          setDebug(`HTTP ${res.status}: ${String(res.text || '').slice(0, 400)}`);
          return;
        }

        const roster = Array.isArray(res.json.roster) ? res.json.roster
                    : Array.isArray(res.json) ? res.json
                    : Array.isArray(res.json.items) ? res.json.items
                    : [];
        const generatedAt = res.json.generated_at || '';

        if (!Array.isArray(roster)) {
          setRosterStatus('名簿更新失敗（JSON形式不明）', 'ng');
          setDebug({
            endpoint: url,
            responsePreview: String(res.text || '').slice(0, 500)
          });
          return;
        }

        saveLocalRoster(roster, generatedAt);
        setRosterStatus(`名簿更新OK: ${roster.length}件`, 'ok');
        updateCheckinControlsState_();
        setDebug({
          endpoint: url,
          generated_at: generatedAt || null,
          firstItem: roster[0] || null
        });
      } catch (e) {
        setRosterStatus('名簿更新失敗（通信？）', 'ng');
        setDebug((e?.name ? e.name + ': ' : '') + (e?.message || String(e)));
      } finally {
        btnFetchRoster.disabled = false;
      }
    }

    function showRosterInfo() {
      const roster = getLocalRoster();
      const generatedAt = localStorage.getItem(LS_KEYS.rosterGeneratedAt) || '';
      if (!roster.length) {
        setRosterStatus('保存済み名簿はありません', 'muted');
        setDebug('roster: empty');
        return;
      }
      setRosterStatus(`名簿あり: ${roster.length}件`, 'ok');
      setDebug({
        count: roster.length,
        generated_at: generatedAt || null,
        firstItem: roster[0] || null
      });
    }

    function parseMst26Qr(raw) {
      if (!raw) return null;
      const m = String(raw).trim().match(/^MST26:(\d{1,4})$/i);
      if (!m) return null;
      return { bib: Number(m[1]), raw: String(raw).trim() };
    }

    function startDecodeLoop() {
      scanActive = true;

      const loop = () => {
        if (!scanActive) return;

        try {
          if (videoEl.readyState >= 2 && videoEl.videoWidth > 0 && videoEl.videoHeight > 0) {
            const w = videoEl.videoWidth;
            const h = videoEl.videoHeight;

            if (decodeCanvas.width !== w || decodeCanvas.height !== h) {
              decodeCanvas.width = w;
              decodeCanvas.height = h;
            }

            decodeCtx.drawImage(videoEl, 0, 0, w, h);
            const imageData = decodeCtx.getImageData(0, 0, w, h);
            const code = jsQR(imageData.data, w, h, { inversionAttempts: 'dontInvert' });

            if (code && code.data) {
              const now = Date.now();

              // 同一コード連発を少し抑制（テスト用）
              if (!(code.data === lastScanText && (now - lastScanAt) < 1500)) {
                lastScanText = code.data;
                lastScanAt = now;

                const parsed = parseMst26Qr(code.data);
                if (parsed) {
                  // pending が残っている間は上書きしない（ロック）
                  if (window.__checkinPending) {
                    const elCheckinActionResult = document.getElementById('checkinActionResult');
                    if (elCheckinActionResult) {
                      elCheckinActionResult.textContent = '確定待ち: RUN / DNS / 取消 を先に押してください';
                    }
                  } else {
                    const roster = getLocalRoster();
                    const hit = roster.find((it) => {
                      const bibVal = Number(it?.bibNumber ?? it?.bib);
                      return Number.isFinite(bibVal) && bibVal === parsed.bib;
                    }) || null;

                    const name = hit ? String(hit.name ?? hit.runnerName ?? hit.fullName ?? '').trim() : '';

                    // ---- 受付確定UIへ反映 ----
                    const pending = {
                      bib: parsed.bib,
                      name: name || '',
                      raw: parsed.raw,
                      state: '', // RUN / DNS はまだ未選択
                      // 再送時の重複送信を避けるため、event_id / scanned_at を固定化
                      eventId: makeCheckinEventId_(),
                      scannedAt: new Date().toISOString()
                    };
                    window.__checkinPending = pending;
                    // 新規pending作成タイミングでのみビープ
                    playScanBeep_();

                    const elPendingBib = document.getElementById('pendingBib');
                    const elPendingName = document.getElementById('pendingName');
                    const elPendingRaw = document.getElementById('pendingRaw');
                    const elPendingState = document.getElementById('pendingState');
                    const elRunBtn = document.getElementById('runBtn');
                    const elDnsBtn = document.getElementById('dnsBtn');
                    const elCancelBtn = document.getElementById('cancelBtn');
                    const elCheckinActionResult = document.getElementById('checkinActionResult');

                    if (elPendingBib) elPendingBib.textContent = String(parsed.bib);
                    if (elPendingName) elPendingName.textContent = name || '（名簿該当なし）';
                    if (elPendingRaw) elPendingRaw.textContent = parsed.raw;
                    if (elPendingState) elPendingState.textContent = '未選択';

                    updateCheckinControlsState_();

                    if (elCheckinActionResult) {
                      elCheckinActionResult.textContent = '確定待ち（RUN / DNS / 取消 を選択）';
                    }

                    // ---- 既存の読取結果表示 ----
                    if (name) {
                      setStatus('QR読取OK（名簿照合OK）', 'ok');
                      setResult(`bib: ${parsed.bib} / ${name} / raw: ${parsed.raw}`);
                    } else if (roster.length === 0) {
                      setStatus('QR読取OK（名簿未取得）', 'warn');
                      setResult(`bib: ${parsed.bib} / 名簿未取得 / raw: ${parsed.raw}`);
                    } else {
                      setStatus('QR読取OK（名簿該当なし）', 'warn');
                      setResult(`bib: ${parsed.bib} / 名簿該当なし / raw: ${parsed.raw}`);
                    }
                  }
                } else {
                  setStatus('QR読取OK（形式未対応）', 'warn');
                  setResult(`raw: ${code.data}`);
                }
              }
            }
          }
        } catch (e) {
          setStatus('読取エラー', 'ng');
          setDebug((e?.name ? e.name + ': ' : '') + (e?.message || String(e)));
        }

        rafId = requestAnimationFrame(loop);
      };

      rafId = requestAnimationFrame(loop);
    }

    function stopDecodeLoop() {
      scanActive = false;
      if (rafId) cancelAnimationFrame(rafId);
      rafId = null;
    }

    async function startCamera() {
      try {
        setStatus('カメラ起動中…', 'muted');
        setDebug('');
        setResult('まだ読取なし');

        const constraints = {
          audio: false,
          video: {
            facingMode: { ideal: 'environment' },
            width: { ideal: 1280 },
            height: { ideal: 1280 }
          }
        };

        stream = await navigator.mediaDevices.getUserMedia(constraints);
        videoEl.srcObject = stream;
        await videoEl.play();

        const track = stream.getVideoTracks()[0];
        setDebug({
          label: track?.label || '',
          settings: track?.getSettings ? track.getSettings() : null
        });

        setStatus('カメラ起動OK（読取待機中）', 'ok');
        stopDecodeLoop();
        startDecodeLoop();
      } catch (e) {
        const msg = (e && e.name ? e.name + ': ' : '') + (e && e.message ? e.message : String(e));
        setStatus('スキャン開始失敗（権限？）', 'ng');
        setDebug(msg);
        console.error(e);
      }
    }

    function stopCamera() {
      stopDecodeLoop();
      try {
        if (stream) {
          for (const t of stream.getTracks()) t.stop();
        }
      } finally {
        stream = null;
        videoEl.srcObject = null;
        setStatus('停止しました', 'muted');
      }
    }

    function makeCheckinEventId_() {
      try {
        if (window.crypto && typeof window.crypto.randomUUID === 'function') {
          return window.crypto.randomUUID();
        }
      } catch (_) {}
      return `evt-${Date.now()}-${Math.random().toString(36).slice(2, 10)}`;
    }

    function getOrCreateCheckinDeviceId_() {
      const key = 'mst26.checkin.deviceId';
      try {
        const existing = (localStorage.getItem(key) || '').trim();
        if (existing) return existing;
      } catch (_) {}

      let suffix = '';
      try {
        if (window.crypto && typeof window.crypto.randomUUID === 'function') {
          suffix = window.crypto.randomUUID();
        }
      } catch (_) {}
      if (!suffix) suffix = `${Date.now()}-${Math.random().toString(36).slice(2, 10)}`;

      const deviceId = `dev-checkin-${suffix}`;
      try { localStorage.setItem(key, deviceId); } catch (_) {}
      return deviceId;
    }

    function toCheckinStartStatus_(uiState) {
      // UIボタンの "DNS" は API/GAS 側の start_status としては DNS_DESK に送る
      return uiState === 'DNS' ? 'DNS_DESK' : uiState;
    }

    async function postCheckin_(pending, uiState) {
      const url = `${FIXED_API_BASE}/checkin`;

      const operator =
        ((operatorEl && operatorEl.value) ? operatorEl.value : (localStorage.getItem(LS_KEYS.operator) || ''))
          .trim();

      const eventId = pending?.eventId || makeCheckinEventId_();
      const scannedAt = pending?.scannedAt || new Date().toISOString();

      const payload = {
        event_id: eventId,
        bibNumber: Number(pending.bib),
        start_status: toCheckinStartStatus_(uiState),
        scanned_at: scannedAt,
        device_id: getOrCreateCheckinDeviceId_(),
        operator
      };

      // 仕様メモ: ブラウザ実装では Content-Type: application/json を明示しない（プリフライト回避）
      const res = await fetchJson(
        url,
        {
          method: 'POST',
          body: JSON.stringify(payload)
        },
        15000
      );

      return { url, payload, res };
    }

    function resetPendingCheckinUi(actionMsg = 'まだ未確定') {
      window.__checkinPending = null;

      const elPendingBib = document.getElementById('pendingBib');
      const elPendingName = document.getElementById('pendingName');
      const elPendingRaw = document.getElementById('pendingRaw');
      const elPendingState = document.getElementById('pendingState');
      const elRunBtn = document.getElementById('runBtn');
      const elDnsBtn = document.getElementById('dnsBtn');
      const elCancelBtn = document.getElementById('cancelBtn');
      const elCheckinActionResult = document.getElementById('checkinActionResult');

      if (elPendingBib) elPendingBib.textContent = '-';
      if (elPendingName) elPendingName.textContent = '-';
      if (elPendingRaw) elPendingRaw.textContent = '-';
      if (elPendingState) elPendingState.textContent = '未選択';

      if (elRunBtn) elRunBtn.disabled = true;
      if (elDnsBtn) elDnsBtn.disabled = true;
      if (elCancelBtn) elCancelBtn.disabled = true;

      if (elCheckinActionResult) elCheckinActionResult.textContent = actionMsg;
      updateCheckinControlsState_();
    }

    async function handleCheckinActionSelect_(state) {
      const pending = window.__checkinPending || null;
      if (!pending) {
        const elCheckinActionResult = document.getElementById('checkinActionResult');
        if (elCheckinActionResult) elCheckinActionResult.textContent = '先にQRを読み取ってください';
        return;
      }

      // 送信前チェック（GAS運用踏襲 + 名簿必須）
      if (!ensureSettingsOrWarn_('checkin')) {
        // pending は保持（再入力後に再送可能）
        return;
      }
      if (!isRosterLoaded_()) {
        if (elCheckinActionResult) elCheckinActionResult.textContent = '送信不可: 名簿未取得';
        return;
      }

      const elPendingState = document.getElementById('pendingState');
      const elRunBtn = document.getElementById('runBtn');
      const elDnsBtn = document.getElementById('dnsBtn');
      const elCancelBtn = document.getElementById('cancelBtn');
      const elCheckinActionResult = document.getElementById('checkinActionResult');

      // RUNのときのみ、DNSからRUNに変更する確認を行う（インラインUI）
      if (state === 'RUN') {
        // 判定は常に最新のローカル名簿を参照（pendingの古い値に依存しない）
        const currentStatus = findRosterStartStatusByBib_(pending.bib);
        if (shouldConfirmRunChange_(currentStatus)) {
          const ok = await openRunChangeInlineConfirm_(currentStatus);
          if (!ok) {
            if (elCheckinActionResult) elCheckinActionResult.textContent = '変更をキャンセルしました';
            return;
          }
        }
      }

      // UI上は押した値（RUN / DNS）を表示
      pending.state = state;
      window.__checkinPending = pending;
      if (elPendingState) elPendingState.textContent = state;

      // 送信中は二重送信防止
      if (elRunBtn) elRunBtn.disabled = true;
      if (elDnsBtn) elDnsBtn.disabled = true;
      if (elCancelBtn) elCancelBtn.disabled = true;

      if (elCheckinActionResult) {
        elCheckinActionResult.textContent = `送信中… ${state}`;
      }

      try {
        const { url, payload, res } = await postCheckin_(pending, state);

        const appOk = !res.json || res.json.ok !== false;
        if (!res.ok || !appOk) {
          // 失敗時は pending を保持（再送しやすさ優先）
          if (window.__checkinPending === pending) {
            if (elRunBtn) elRunBtn.disabled = false;
            if (elDnsBtn) elDnsBtn.disabled = false;
            if (elCancelBtn) elCancelBtn.disabled = false;

            if (elCheckinActionResult) {
              elCheckinActionResult.textContent = `送信失敗: ${state}（再送可）`;
            }
          }

          setDebug({
            endpoint: url,
            request: payload,
            status: res.status,
            responsePreview: String(res.text || '').slice(0, 500)
          });
          return;
        }

        setDebug({
          endpoint: url,
          request: payload,
          response: res.json ?? String(res.text || '').slice(0, 500)
        });

        // 送信成功時は pending をクリア（次スキャンへ）
        // ※送信中に別のQRで pending が上書きされていたら消さない
        if (window.__checkinPending === pending) {
          // 成功内容をローカル名簿に反映（確認判定の最新化）
          const applied = toCheckinStartStatus_(state);
          updateLocalRosterStartStatus_(pending.bib, applied);
          resetPendingCheckinUi(`送信OK: ${state}`);
          closeRunChangeInlineConfirm_();
        } else if (elCheckinActionResult) {
          elCheckinActionResult.textContent = `送信OK: ${state}`;
        }
      } catch (e) {
        if (window.__checkinPending === pending) {
          if (elRunBtn) elRunBtn.disabled = false;
          if (elDnsBtn) elDnsBtn.disabled = false;
          if (elCancelBtn) elCancelBtn.disabled = false;

          if (elCheckinActionResult) {
            elCheckinActionResult.textContent = `送信失敗: ${state}（再送可）`;
          }
        }
        closeRunChangeInlineConfirm_();
        setDebug((e?.name ? e.name + ': ' : '') + (e?.message || String(e)));
      }
    }

    function handleCheckinCancel_() {
      closeRunChangeInlineConfirm_();
      resetPendingCheckinUi('取消しました');
    }

    btnStart.addEventListener('click', () => { try { ensureBeepReady_(); } catch(_) {} startCamera(); });
    btnStop.addEventListener('click', stopCamera);

    btnLoadSettings.addEventListener('click', loadSettings);
    btnSaveSettings.addEventListener('click', () => { try { ensureBeepReady_(); } catch(_) {} saveSettings(); });
    btnClearSettings.addEventListener('click', clearSettings);

    btnFetchRoster.addEventListener('click', () => { try { ensureBeepReady_(); } catch(_) {} fetchRoster(); });
    btnShowRosterInfo.addEventListener('click', showRosterInfo);

    // 受付確定
    document.getElementById('runBtn')?.addEventListener('click', () => { try { ensureBeepReady_(); } catch(_) {} handleCheckinActionSelect_('RUN'); });
    document.getElementById('dnsBtn')?.addEventListener('click', () => { try { ensureBeepReady_(); } catch(_) {} handleCheckinActionSelect_('DNS'); });
    document.getElementById('cancelBtn')?.addEventListener('click', () => { try { ensureBeepReady_(); } catch(_) {} handleCheckinCancel_(); });

    // 初回ジェスチャでの有効化保険（ワンクリックのみ）
    try { document.addEventListener('click', ensureBeepReady_, { once: true, capture: true }); } catch(_) {}

    // 初期状態（受付確定UI）
    resetPendingCheckinUi();

    // 初回表示時に保存済み設定があれば反映
    loadSettings();

    // iPhone Safari確認のため、まだ自動起動しない
  </script>
</body>
</html>
